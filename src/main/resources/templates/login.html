<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DiyanniMoney - Login</title>
  <link rel="stylesheet" th:href="@{/css/styles.css}" />
</head>
<body>
  <div th:replace="fragments/header :: header"></div>
  <main style="max-width:400px;margin:100px auto 60px;padding:24px;">
    <h1 th:text="${message}">Login</h1>
    <div th:if="${loginError}" style="margin-bottom:16px;padding:12px;border-radius:12px;background:rgba(255,107,107,0.14);color:#ff6b6b;">Invalid credentials. Please try again.</div>
    <form th:action="@{/login}" method="post" style="display:flex;flex-direction:column;gap:16px;margin-top:24px;">
      <div>
        <label style="display:block;margin-bottom:6px;color:white;">Email</label>
        <input name="email" type="email" placeholder="you@example.com" required style="width:100%;padding:8px 12px;border-radius:8px;border:1px solid var(--muted);background:rgba(255,255,255,0.08);color:white;">
      </div>
      <div>
        <label style="display:block;margin-bottom:6px;color:white;">Password</label>
        <input name="password" type="password" placeholder="••••••••" required style="width:100%;padding:8px 12px;border-radius:8px;border:1px solid var(--muted);background:rgba(255,255,255,0.08);color:white;">
      </div>
      <button type="submit" class="btn" style="width:100%;cursor:pointer;">Sign In</button>
    </form>
    <p style="text-align:center;color:var(--muted);margin-top:16px;">Don't have an account? <a th:href="@{/register}">Register here</a></p>
    <p style="text-align:center;color:var(--muted);margin-top:8px;"><a th:href="@{/}">Back to Home</a></p>
  </main>
</body>
</html>

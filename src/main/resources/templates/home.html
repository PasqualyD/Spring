<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DiyanniMoney - Home</title>
  <link rel="stylesheet" th:href="@{/css/styles.css}" />
</head>
<body>
  <div th:replace="~{fragments/header :: header}"></div>

  <section class="hero" sec:authorize="isAnonymous()">
    <div class="left">
      <h1>Join Our Community</h1>
      <p class="lead">Create an account to access your personal dashboard, tools, and member-only resources.</p>
      <div class="cta">
        <a class="btn" th:href="@{/login}">Login</a>
        <a class="muted-link" th:href="@{/register}">Register</a>
      </div>
    </div>
  </section>

  <section class="hero dashboard" sec:authorize="isAuthenticated()">
    <div class="dashboard-header">
      <h1>Welcome back, <span sec:authentication="name">User</span>!</h1>
      <p class="lead">Your dashboard is ready. Access your personalized tools and activity overview now.</p>
      <div class="cta" style="margin-top:24px;">
        <a class="btn" th:href="@{/dashboard}">Go to My Dashboard</a>
      </div>
    </div>
  </section>

  <section sec:authorize="isAuthenticated()" style="max-width:1100px;margin:0 auto;padding:24px;color:white;">
    <div class="card" style="background:rgba(255,255,255,0.04);">
      <h3>Database Users</h3>
      <ul>
        <li th:each="user : ${allUsers}">
          <span th:text="${user.name}">Name</span> - 
          <span th:text="${user.email}" style="color:var(--muted)">Email</span>
        </li>
      </ul>
    </div>
  </section>
</body>
</html>

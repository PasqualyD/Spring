<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact</title>
  <link rel="stylesheet" th:href="@{/css/styles.css}" />
</head>
<body>
  <div th:replace="fragments/header :: header"></div>
  <main style="max-width:900px;margin:100px auto 60px;padding:24px;color:var(--muted);background:transparent;">
    <h1 th:text="${message}">Contact</h1>
    <p>Have questions or feedback? This demo doesn't send messages, but you can wire a form to a backend handler.</p>
    <p>Example contact: demo@example.com</p>
    <p><a th:href="@{/}">Back to Home</a></p>
  </main>
</body>
</html>

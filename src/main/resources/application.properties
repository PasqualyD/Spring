# ═══════════════════════════════════════════════════════════
# DiyanniMoney — application.properties
#
# Required Railway environment variables for live mode:
#   ALPACA_API_KEY      = your Alpaca paper trading API key
#   ALPACA_API_SECRET   = your Alpaca paper trading secret key
#   MARKET_DATA_MODE    = live
#   ALPACA_REFRESH_RATE = 15000 (optional, ms between price polls)
#
# Without MARKET_DATA_MODE=live the app runs in simulated mode
# automatically — no Alpaca credentials required.
# ═══════════════════════════════════════════════════════════
spring.application.name=DiyanniMoney

# Server
server.port=${PORT:8080}

# Database
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/mydatabase}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:password}

# JPA
# WARNING: set JPA_DDL_AUTO=validate or none in production
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Redis
spring.data.redis.url=${REDIS_URL:redis://localhost:6379}
spring.data.redis.timeout=2000ms
spring.data.redis.connect-timeout=3000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0
spring.data.redis.lettuce.shutdown-timeout=200ms

# Kafka (only used when kafka.enabled=true)
kafka.enabled=${KAFKA_ENABLED:false}
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=trade-dedup-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.admin.fail-fast=false

# Alpaca API
alpaca.api.key=${ALPACA_API_KEY:}
alpaca.api.secret=${ALPACA_API_SECRET:}
alpaca.paper.base-url=https://paper-api.alpaca.markets
alpaca.data.base-url=https://data.alpaca.markets
alpaca.refresh.rate=${ALPACA_REFRESH_RATE:15000}

# Market data mode: "live" uses Alpaca, "simulated" uses PriceSimulationService
market.data.mode=${MARKET_DATA_MODE:simulated}

# Actuator (for Railway health checks)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.health.redis.enabled=false
management.health.db.enabled=false
